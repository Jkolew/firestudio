<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하루 — 공유된 일기</title>
<meta name="description" content="하루는 오늘 하루를 일기로 기록하면, 감정을 분석해 나만의 애니메이션을 만들어주는 감성 일기 서비스입니다.">
<meta name="robots" content="noindex">
<meta property="og:type" content="website">
<meta property="og:title" content="하루 — 공유된 일기">
<meta property="og:description" content="오늘 하루를 글로 적으면, 감정을 분석해 나만의 애니메이션으로 만들어드립니다.">
<meta property="og:url" content="https://haru-diary.web.app/share.html">
<link rel="canonical" href="https://haru-diary.web.app/share.html">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2973009474553970"
     crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08080F; --surface:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.08);
  --text:#D4D4D8; --muted:#71717A; --accent:#C4A882; --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;}

#share-canvas{position:fixed;inset:0;width:100%;height:100%;}

.player-top{position:fixed;top:0;left:0;right:0;z-index:10;padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.player-meta{display:flex;align-items:center;gap:10px;}
.player-date{font-family:'Noto Serif KR',serif;font-size:14px;color:rgba(255,255,255,.55);}
.player-emotion-badge{font-size:11px;padding:3px 10px;border-radius:100px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);}
.share-badge{background:rgba(196,168,130,.15);border:1px solid rgba(196,168,130,.3);color:var(--accent);padding:5px 12px;border-radius:100px;font-size:11px;}

.diary-overlay{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:0 32px 28px;background:linear-gradient(transparent,rgba(0,0,0,.88) 35%);}
.player-action-row{display:flex;gap:10px;margin-top:14px;}
.btn-share{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);padding:9px 20px;border-radius:100px;font-size:13px;font-family:inherit;cursor:pointer;backdrop-filter:blur(10px);transition:all .2s;}
.btn-share:hover{background:rgba(255,255,255,.2);}

.error-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted);font-family:'Noto Serif KR',serif;}
.error-screen h2{font-size:20px;font-weight:400;color:var(--text);}
.error-screen p{font-size:14px;}
.btn-home{margin-top:8px;background:var(--accent);color:#08080F;border:none;padding:12px 28px;border-radius:100px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<canvas id="share-canvas"></canvas>

<div class="player-top">
  <div class="player-meta">
    <div class="player-date" id="share-player-date"></div>
    <div class="player-emotion-badge" id="share-player-emotion-badge"></div>
  </div>
  <div class="share-badge">공유된 하루</div>
</div>

<div class="diary-overlay">
  <div class="player-action-row">
    <button class="btn-share" onclick="window.location.href='index.html'">나도 써보기</button>
  </div>
</div>

<script src="animation-engine.js"></script>
<script src="draw-character.js"></script>
<script>
(function(){
  const hash = location.hash;
  if(!hash.startsWith('#share=')){
    document.body.innerHTML = `
      <div class="error-screen">
        <h2>일기를 찾을 수 없어요</h2>
        <p>공유 링크가 올바르지 않거나 만료되었습니다.</p>
        <button class="btn-home" onclick="location.href='index.html'">하루 시작하기</button>
      </div>`;
    return;
  }
  try{
    const entry = JSON.parse(decodeURIComponent(escape(atob(hash.slice(7)))));

    // Set metadata
    const dateEl = document.getElementById('share-player-date');
    const badgeEl = document.getElementById('share-player-emotion-badge');
    if(dateEl) dateEl.textContent = fmtDateKo(entry.date);
    if(badgeEl){
      badgeEl.textContent = emotionLabel(entry.emotion);
      badgeEl.style.color = emotionColor(entry.emotion);
      badgeEl.style.borderColor = emotionColor(entry.emotion)+'44';
    }

    // Play animation
    const canvas = document.getElementById('share-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    startSceneSequence(canvas, entry.text, entry.style, entry.date);

  } catch(e){
    document.body.innerHTML = `
      <div class="error-screen">
        <h2>일기를 불러올 수 없어요</h2>
        <p>링크가 손상되었거나 지원되지 않는 형식입니다.</p>
        <button class="btn-home" onclick="location.href='index.html'">하루 시작하기</button>
      </div>`;
  }
})();

function fmtDateKo(s){
  try{const[y,m,d]=s.split('-');return `${y}년 ${+m}월 ${+d}일`;}
  catch{return s||'';}
}
</script>
</body>
</html>
